<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slingshot Quest - Angry Birds Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 40%, #B4E4F5 70%, #E8F4E8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 120px 80px at 10% 15%, rgba(255,255,255,0.9) 0%, transparent 70%),
                radial-gradient(ellipse 180px 100px at 25% 10%, rgba(255,255,255,0.8) 0%, transparent 70%),
                radial-gradient(ellipse 150px 90px at 50% 20%, rgba(255,255,255,0.85) 0%, transparent 70%),
                radial-gradient(ellipse 200px 110px at 80% 12%, rgba(255,255,255,0.8) 0%, transparent 70%),
                radial-gradient(ellipse 140px 85px at 95% 25%, rgba(255,255,255,0.9) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 5%; left: -20%;
            width: 300px; height: 100px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.6) 0%, transparent 70%);
            animation: floatCloud 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatCloud {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 300px)); }
        }

        #gameContainer {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.3),
                0 0 0 5px #5D4037,
                0 0 0 8px #3E2723;
            border: 5px solid #5D4037;
            z-index: 1;
        }

        #gameCanvas { display: block; }

        #ui {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            background: linear-gradient(145deg, #5D4037, #4E342E);
            border-radius: 15px;
            padding: 8px 15px;
            box-shadow: 
                0 4px 15px rgba(0,0,0,0.3),
                inset 0 2px 0 rgba(255,255,255,0.1),
                inset 0 -2px 0 rgba(0,0,0,0.2);
            border: 3px solid #3E2723;
            pointer-events: auto;
        }

        .hud-left { display: flex; gap: 10px; }

        .score-display {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-family: 'Luckiest Guy', cursive;
            font-size: 22px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .score-icon {
            width: 35px; height: 35px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(255,165,0,0.5);
            border: 3px solid #FF8F00;
        }

        .coin-display { color: #FFD700; font-size: 20px; }

        .hud-right { display: flex; gap: 10px; }

        .level-display {
            background: linear-gradient(145deg, #E53935, #C62828);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(229,57,53,0.4);
            border: 3px solid #B71C1C;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .lives-display {
            display: flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(145deg, #424242, #303030);
            padding: 8px 15px;
            border-radius: 20px;
            border: 3px solid #212121;
        }

        .life-heart { font-size: 22px; animation: heartBeat 1s ease infinite; }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .lives-count {
            color: white;
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .pause-btn {
            width: 45px; height: 45px;
            background: linear-gradient(145deg, #FFC107, #FFB300);
            border-radius: 50%;
            border: 3px solid #FF8F00;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255,193,7,0.4);
            transition: all 0.2s ease;
        }

        .pause-btn:hover { transform: scale(1.1); }
        .pause-btn:active { transform: scale(0.95); }

        #levelIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #E53935, #C62828);
            padding: 15px 50px;
            border-radius: 30px;
            color: white;
            font-family: 'Luckiest Guy', cursive;
            font-size: 30px;
            box-shadow: 0 6px 25px rgba(229,57,53,0.5);
            border: 4px solid #B71C1C;
            z-index: 15;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
            animation: levelPopIn 0.5s ease-out;
        }

        @keyframes levelPopIn {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .screen-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }

        #startScreen { background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 50%, #B4E4F5 100%); }
        #gameOverScreen { background: linear-gradient(180deg, #37474F 0%, #263238 100%); }
        #levelCompleteScreen { background: linear-gradient(180deg, #C8E6C9 0%, #A5D6A7 50%, #81C784 100%); }
        #winScreen { background: linear-gradient(180deg, #FFD54F 0%, #FFCA28 50%, #FFC107 100%); }

        .angry-bird-logo {
            width: 140px; height: 140px;
            position: relative;
            margin-bottom: 15px;
        }

        .bird-body {
            width: 110px; height: 110px;
            background: linear-gradient(145deg, #E53935, #C62828);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                inset -12px -12px 25px rgba(0,0,0,0.2),
                inset 8px 8px 15px rgba(255,255,255,0.2),
                0 10px 30px rgba(0,0,0,0.3);
            border: 4px solid #B71C1C;
        }

        .bird-eyebrow {
            position: absolute;
            width: 35px; height: 10px;
            background: #212121;
            top: 22px;
            border-radius: 8px;
        }

        .bird-eyebrow.left { left: 18px; transform: rotate(-20deg); }
        .bird-eyebrow.right { right: 18px; transform: rotate(20deg); }

        .bird-eye {
            position: absolute;
            width: 30px; height: 30px;
            background: white;
            border-radius: 50%;
            top: 32px;
            border: 3px solid #212121;
        }

        .bird-eye.left { left: 20px; }
        .bird-eye.right { right: 20px; }

        .bird-pupil {
            position: absolute;
            width: 15px; height: 15px;
            background: #212121;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .bird-pupil::after {
            content: '';
            position: absolute;
            width: 5px; height: 5px;
            background: white;
            border-radius: 50%;
            top: 2px; right: 2px;
        }

        .bird-mouth {
            position: absolute;
            width: 45px; height: 25px;
            background: #FFB300;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 45px 45px;
            border: 3px solid #FF8F00;
            border-top: none;
        }

        .bird-feather {
            position: absolute;
            width: 22px; height: 35px;
            background: linear-gradient(145deg, #C62828, #B71C1C);
            border-radius: 50%;
            top: -12px;
        }

        .bird-feather.left { left: 12px; transform: rotate(-25deg); }
        .bird-feather.right { right: 12px; transform: rotate(25deg); }

        .screen-title { 
            font-family: 'Luckiest Guy', cursive;
            font-size: 48px; 
            margin-bottom: 20px; 
            letter-spacing: 3px;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }
        
        .title-red { color: #E53935; }
        .title-white { color: #FFFFFF; text-shadow: 4px 4px 0 rgba(0,0,0,0.5); }
        .title-green { color: #2E7D32; }
        .title-gold { color: #FF8F00; text-shadow: 4px 4px 0 #5D4037; }

        .game-card {
            background: linear-gradient(145deg, #FFFFFF, #F5F5F5);
            border-radius: 20px;
            padding: 30px 50px;
            margin: 15px 0;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.2),
                0 0 0 5px #5D4037,
                0 0 0 8px #3E2723;
            text-align: center;
            border: 4px solid #5D4037;
        }

        .game-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 44px;
            color: #E53935;
            text-shadow: 3px 3px 0 #5D4037;
            margin-bottom: 8px;
        }

        .game-subtitle {
            font-size: 18px; 
            color: #5D4037; 
            letter-spacing: 3px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 18px; 
            color: #5D4037; 
            margin: 15px 0; 
            font-weight: 700;
        }

        .btn {
            padding: 15px 50px; 
            border: none; 
            border-radius: 25px;
            font-size: 22px; 
            font-weight: 800; 
            cursor: pointer;
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
            margin: 10px;
            transition: all 0.2s ease;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
            border-radius: 25px 25px 0 0;
        }

        .btn:hover { transform: translateY(-5px) scale(1.05); }
        .btn:active { transform: translateY(0) scale(0.98); }

        .btn-red { 
            background: linear-gradient(145deg, #E53935, #C62828);
            color: white;
            box-shadow: 0 6px 0 #B71C1C, 0 10px 20px rgba(229,57,53,0.4);
        }

        .btn-green { 
            background: linear-gradient(145deg, #43A047, #2E7D32);
            color: white;
            box-shadow: 0 6px 0 #1B5E20, 0 10px 20px rgba(67,160,71,0.4);
        }

        .btn-blue { 
            background: linear-gradient(145deg, #1E88E5, #1565C0);
            color: white;
            box-shadow: 0 6px 0 #0D47A1, 0 10px 20px rgba(30,136,229,0.4);
        }

        .btn-gold { 
            background: linear-gradient(145deg, #FFB300, #FFA000);
            color: #5D4037;
            box-shadow: 0 6px 0 #FF8F00, 0 10px 20px rgba(255,179,0,0.4);
        }

        .level-select {
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            justify-content: center;
            max-width: 320px; 
            margin: 20px 0;
        }

        .level-btn {
            width: 55px; height: 55px;
            border-radius: 50%;
            border: none;
            font-family: 'Luckiest Guy', cursive;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 6px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .level-btn::before {
            content: '';
            position: absolute;
            top: 5px; left: 10px; right: 10px;
            height: 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        .level-btn:hover:not(:disabled) { transform: translateY(-3px) scale(1.1); }
        .level-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(50%); }
        .level-btn.red { background: linear-gradient(145deg, #E53935, #C62828); border: 4px solid #B71C1C; }
        .level-btn.green { background: linear-gradient(145deg, #43A047, #2E7D32); border: 4px solid #1B5E20; }
        .level-btn.completed { background: linear-gradient(145deg, #43A047, #2E7D32); border: 4px solid #1B5E20; }

        .level-btn.completed::after {
            content: '✓';
            position: absolute;
            font-size: 30px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .progress-container { margin: 20px 0; }

        .progress-label {
            display: flex; 
            justify-content: space-between;
            font-size: 16px; 
            color: #5D4037; 
            margin-bottom: 10px;
            font-weight: 700;
        }

        .angry-progress {
            width: 280px; 
            height: 22px;
            background: linear-gradient(145deg, #5D4037, #4E342E);
            border-radius: 15px; 
            overflow: hidden;
            border: 4px solid #3E2723;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.3);
        }

        .angry-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #E53935, #EF5350);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 15px rgba(229,57,53,0.5);
        }

        .stars { font-size: 50px; margin: 15px 0; display: flex; gap: 12px; }

        .star { color: #FFD700; text-shadow: 2px 2px 0 #FF8F00; animation: starPop 0.4s ease-out; }
        .star.empty { color: #9E9E9E; text-shadow: none; }

        @keyframes starPop {
            0% { transform: scale(0) rotate(-180deg); }
            50% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .stat-row-display { display: flex; gap: 20px; margin: 20px 0; }

        .stat-box {
            text-align: center; 
            padding: 15px 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid #5D4037;
        }

        .stat-box-value {
            font-family: 'Luckiest Guy', cursive;
            font-size: 34px; 
            color: #E53935;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        .stat-box-label { 
            font-size: 14px; 
            color: #5D4037; 
            margin-top: 5px; 
            font-weight: 700;
        }

        .hidden { display: none !important; }

        #mobileControls {
            position: fixed; 
            bottom: 25px; 
            left: 0; 
            right: 0;
            display: flex; 
            justify-content: center; 
            z-index: 50;
        }

        .control-group { display: flex; gap: 20px; }

        .mobile-btn {
            width: 75px; 
            height: 75px; 
            border-radius: 50%;
            border: none; 
            font-size: 32px;
            background: linear-gradient(145deg, #5D4037, #4E342E);
            box-shadow: 0 6px 0 #3E2723, 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer; 
            transition: all 0.1s ease;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #3E2723, 0 4px 10px rgba(0,0,0,0.3);
        }

        @media (max-width: 850px) {
            #gameContainer { transform: scale(0.85); }
            .game-title { font-size: 34px; }
            .screen-title { font-size: 38px; }
        }

        @media (max-width: 700px) {
            #gameContainer { transform: scale(0.7); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .bounce { animation: bounce 0.6s ease infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake { animation: shake 0.3s ease; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        
        <div id="ui">
            <div class="hud-left">
                <div class="hud-panel score-display">
                    <div class="score-icon">⭐</div>
                    <span id="score">0</span>
                </div>
                <div class="hud-panel score-display">
                    <div class="score-icon">💎</div>
                    <span class="coin-display" id="coins">0</span>
                </div>
            </div>
            <div class="hud-right">
                <div class="level-display">LV.<span id="playerLevel">1</span></div>
                <div class="lives-display">
                    <span class="life-heart">❤️</span>
                    <span class="lives-count" id="lives">3</span>
                </div>
            </div>
        </div>
        
        <div id="levelIndicator" class="hidden">LEVEL <span id="chapterLevel">1</span></div>
        
        <div id="startScreen" class="screen-overlay">
            <div class="angry-bird-logo bounce">
                <div class="bird-body">
                    <div class="bird-feather left"></div>
                    <div class="bird-feather right"></div>
                    <div class="bird-eyebrow left"></div>
                    <div class="bird-eyebrow right"></div>
                    <div class="bird-eye left"><div class="bird-pupil"></div></div>
                    <div class="bird-eye right"><div class="bird-pupil"></div></div>
                    <div class="bird-mouth"></div>
                </div>
            </div>
            <div class="game-card float-animation">
                <div class="game-title">SLINGSHOT QUEST</div>
                <div class="game-subtitle">ANGRY BIRDS STYLE</div>
            </div>
            <div class="subtitle">12 challenging levels await!</div>
            <div class="progress-container">
                <div class="progress-label">
                    <span>Progress</span>
                    <span id="progressText">0/12</span>
                </div>
                <div class="angry-progress">
                    <div class="angry-progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            <div class="level-select" id="levelSelect"></div>
            <button class="btn btn-red" onclick="startGame(1)">▶ PLAY</button>
        </div>
        
        <div id="levelCompleteScreen" class="screen-overlay hidden">
            <div class="game-card">
                <div class="screen-title title-green">LEVEL CLEAR!</div>
            </div>
            <div class="stars" id="levelStars">
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
            </div>
            <div class="stat-row-display">
                <div class="stat-box">
                    <div class="stat-box-value" id="levelScore">0</div>
                    <div class="stat-box-label">SCORE</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-value" id="levelCoins">0</div>
                    <div class="stat-box-label">GEMS</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-value" id="levelTime">0s</div>
                    <div class="stat-box-label">TIME</div>
                </div>
            </div>
            <button class="btn btn-green" onclick="nextLevel()">▶ NEXT</button>
            <button class="btn btn-blue" onclick="restartFromLevelComplete()">↻ RETRY</button>
        </div>
        
        <div id="gameOverScreen" class="screen-overlay hidden">
            <div class="angry-bird-logo shake">
                <div class="bird-body">
                    <div class="bird-feather left"></div>
                    <div class="bird-feather right"></div>
                    <div class="bird-eyebrow left" style="transform: rotate(-40deg);"></div>
                    <div class="bird-eyebrow right" style="transform: rotate(40deg);"></div>
                    <div class="bird-eye left"><div class="bird-pupil"></div></div>
                    <div class="bird-eye right"><div class="bird-pupil"></div></div>
                    <div class="bird-mouth" style="height: 15px; border-radius: 0 0 30px 30px;"></div>
                </div>
            </div>
            <div class="screen-title title-red">GAME OVER</div>
            <div class="subtitle" style="color: #B0BEC5;">Don't give up, champion!</div>
            <div class="stat-row-display">
                <div class="stat-box">
                    <div class="stat-box-value" id="finalScore">0</div>
                    <div class="stat-box-label">SCORE</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-value" id="finalLevel">1</div>
                    <div class="stat-box-label">LEVEL</div>
                </div>
            </div>
            <button class="btn btn-red" onclick="retryLevel()">↻ RETRY</button>
            <button class="btn btn-gold" onclick="restartGame()">🏠 MENU</button>
        </div>
        
        <div id="winScreen" class="screen-overlay hidden">
            <div class="angry-bird-logo bounce">
                <div class="bird-body" style="background: linear-gradient(145deg, #FFD700, #FFA000); border-color: #FF8F00;">
                    <div class="bird-feather left" style="background: linear-gradient(145deg, #FFD700, #FFA000);"></div>
                    <div class="bird-feather right" style="background: linear-gradient(145deg, #FFD700, #FFA000);"></div>
                    <div class="bird-eyebrow left"></div>
                    <div class="bird-eyebrow right"></div>
                    <div class="bird-eye left"><div class="bird-pupil"></div></div>
                    <div class="bird-eye right"><div class="bird-pupil"></div></div>
                    <div class="bird-mouth"></div>
                </div>
            </div>
            <div class="screen-title title-gold">YOU WIN!</div>
            <div class="subtitle">All 12 levels conquered!</div>
            <div class="stars">🏆🏆🏆</div>
            <div class="stat-row-display">
                <div class="stat-box">
                    <div class="stat-box-value" id="winScore">0</div>
                    <div class="stat-box-label">SCORE</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-value" id="winCoins">0</div>
                    <div class="stat-box-label">GEMS</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-value" id="winTime">0s</div>
                    <div class="stat-box-label">TIME</div>
                </div>
            </div>
            <button class="btn btn-gold" onclick="restartGame()">▶ AGAIN</button>
        </div>
    </div>

    <div id="mobileControls">
        <div class="control-group">
            <button class="mobile-btn" id="btnLeft">◀</button>
            <button class="mobile-btn" id="btnRight">▶</button>
            <button class="mobile-btn" id="btnJump">▲</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameRunning = false;
        let currentLevel = 1;
        let totalLevels = 12;
        let score = 0, levelScore = 0, coins = 0, levelCoins = 0, lives = 3;
        let cameraX = 0, levelStartTime = 0, totalTime = 0;
        let unlockedLevels = JSON.parse(localStorage.getItem('unlockedLevels')) || [1];
        let completedLevels = JSON.parse(localStorage.getItem('completedLevels')) || [];
        
        if (!Array.isArray(unlockedLevels)) unlockedLevels = [1];
        if (!Array.isArray(completedLevels)) completedLevels = [];
        
        let particles = [], floatingTexts = [], screenShake = 0, spRecharge = 100;

        const GRAVITY = 0.5, FRICTION = 0.88, TILE_SIZE = 32;

        const player = {
            x: 50, y: 300, width: 40, height: 50,
            vx: 0, vy: 0, speed: 5, jumpPower: -12,
            grounded: false, invincible: 0, direction: 1,
            state: 'idle', frame: 0, animTimer: 0, auraPhase: 0
        };

        const keys = { left: false, right: false, jump: false, jumpPressed: false };

        const level = {
            width: 2400, platforms: [], enemies: [], coins: [],
            flags: [], decorations: [], stars: [], movingPlatforms: [], theme: 'pink'
        };

        const themes = {
            pink: { sky1: '#ffecd2', sky2: '#fcb69f', ground1: '#ff9a9e', ground2: '#fecfef', accent: '#ff6b9d', name: 'Sakura Garden' },
            blue: { sky1: '#a8edea', sky2: '#fed6e3', ground1: '#89f7fe', ground2: '#66a6ff', accent: '#74b9ff', name: 'Ocean Breeze' },
            purple: { sky1: '#e0c3fc', sky2: '#8ec5fc', ground1: '#c471ed', ground2: '#f64f59', accent: '#a29bfe', name: 'Twilight Castle' },
            green: { sky1: '#d4fc79', sky2: '#96e6a1', ground1: '#84fab0', ground2: '#8fd3f4', accent: '#55efc4', name: 'Meadow Dreams' },
            orange: { sky1: '#fce4ec', sky2: '#ffcdd2', ground1: '#ffab91', ground2: '#ff8a65', accent: '#ffb74d', name: 'Sunset Valley' },
            rainbow: { sky1: '#ffecd2', sky2: '#fcb69f', ground1: '#a18cd1', ground2: '#fbc2eb', accent: '#fad0c4', name: 'Dreamland' }
        };

        function generateLevel(levelNum) {
            level.platforms = []; level.enemies = []; level.coins = [];
            level.flags = []; level.decorations = []; level.stars = []; level.movingPlatforms = [];

            const themeOrder = ['pink', 'blue', 'purple', 'green', 'orange', 'rainbow', 'pink', 'blue', 'purple', 'green', 'orange', 'rainbow'];
            level.theme = themeOrder[(levelNum - 1) % themeOrder.length];
            const theme = themes[level.theme] || themes.pink;
            canvas.style.background = `linear-gradient(180deg, ${theme.sky1} 0%, ${theme.sky2} 55%, ${theme.ground2} 55%, ${theme.ground2} 100%)`;

            for (let x = 0; x < level.width; x += TILE_SIZE) {
                let isGap = false;
                const gapCount = Math.floor(levelNum / 3) + 1;
                for (let g = 0; g < gapCount; g++) {
                    const gapStart = 200 + (g * (level.width / gapCount));
                    if (x > gapStart && x < gapStart + 120) isGap = true;
                }
                if (!isGap) level.platforms.push({ x, y: 416, width: TILE_SIZE, height: 64, type: 'ground' });
            }

            const platformCount = 10 + levelNum * 2;
            for (let i = 0; i < platformCount; i++) {
                const x = 150 + i * (level.width / platformCount) + (Math.random() - 0.5) * 100;
                const y = 180 + Math.random() * 220;
                const w = 80 + Math.random() * 100;
                level.platforms.push({ x: Math.max(50, Math.min(level.width - w - 50, x)), y, width: w, height: 24, type: 'platform' });
            }

            if (levelNum >= 4) {
                for (let i = 0; i < levelNum - 3; i++) {
                    level.movingPlatforms.push({
                        x: 400 + i * 500, y: 250 + Math.random() * 100, width: 90, height: 24,
                        startX: 400 + i * 500, endX: 400 + i * 500 + 200,
                        speed: 1.5 + levelNum * 0.1, direction: 1
                    });
                }
            }

            const gemCount = 15 + levelNum * 3;
            for (let i = 0; i < gemCount; i++) {
                const x = 100 + i * (level.width / gemCount);
                const y = 150 + Math.random() * 250;
                level.coins.push({ x, y, collected: false, bounceOffset: Math.random() * Math.PI * 2 });
            }

            if (levelNum >= 3) {
                const starCount = Math.min(levelNum - 2, 5);
                for (let i = 0; i < starCount; i++) {
                    const x = 300 + i * (level.width / starCount);
                    const y = 100 + Math.random() * 200;
                    level.stars.push({ x, y, collected: false, angle: 0 });
                }
            }

            const enemyTypes = ['slime', 'spirit', 'knight', 'wizard', 'dragon'];
            const enemyCount = 4 + levelNum;
            for (let i = 0; i < enemyCount; i++) {
                const x = 200 + i * (level.width / enemyCount);
                const patrolRange = 100 + levelNum * 10;
                level.enemies.push({
                    x, y: 384, width: 36, height: 40,
                    vx: 1.5 + levelNum * 0.15, vy: 0,
                    patrolStart: x - patrolRange, patrolEnd: x + patrolRange,
                    alive: true, squashTimer: 0,
                    type: enemyTypes[Math.min(enemyTypes.length - 1, Math.max(0, Math.floor(Math.random() * enemyTypes.length)))],
                    animFrame: 0, hue: Math.random() * 360
                });
            }

            level.flags.push({ x: level.width - 100, y: 192 });

            for (let x = 0; x < level.width; x += 200 + Math.random() * 150) {
                level.decorations.push({ x, type: 'flower', variant: Math.floor(Math.random() * 3), color: theme.accent });
            }
            for (let x = 0; x < level.width; x += 180 + Math.random() * 100) {
                level.decorations.push({ x, type: 'cloud', y: 40 + Math.random() * 80, variant: Math.floor(Math.random() * 3) });
            }
        }

        function resetPlayer() {
            player.x = 50; player.y = 300; player.vx = 0; player.vy = 0;
            player.grounded = false; player.invincible = 0; cameraX = 0; spRecharge = 100;
        }

        function rectCollision(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function createParticle(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12 - 5,
                    life: 40 + Math.random() * 20, size: 4 + Math.random() * 6, color, angle: Math.random() * Math.PI * 2
                });
            }
        }

        function createFloatingText(x, y, text, color = '#ff6b9d') {
            floatingTexts.push({ x, y, text, color, life: 60, vy: -2 });
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; p.angle += 0.1;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const t = floatingTexts[i];
                t.y += t.vy; t.life--;
                if (t.life <= 0) floatingTexts.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.globalAlpha = p.life / 60;
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            });
        }

        function drawFloatingTexts() {
            floatingTexts.forEach(t => {
                ctx.globalAlpha = t.life / 60;
                ctx.fillStyle = t.color;
                ctx.font = 'bold 22px Nunito';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 10;
                ctx.fillText(t.text, t.x - cameraX, t.y);
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        }

        function update() {
            if (!gameRunning) return;

            if (keys.left) { player.vx = -player.speed; player.direction = -1; player.state = 'walk'; }
            else if (keys.right) { player.vx = player.speed; player.direction = 1; player.state = 'walk'; }
            else { player.vx *= FRICTION; player.state = 'idle'; }

            if (keys.jump && player.grounded && !keys.jumpPressed) {
                player.vy = player.jumpPower; player.grounded = false; player.state = 'jump';
                keys.jumpPressed = true;
                createParticle(player.x + player.width/2, player.y + player.height, '#ffb8d0', 8);
            }
            if (!keys.jump) keys.jumpPressed = false;
            if (!player.grounded) player.state = 'jump';
            player.auraPhase += 0.08;
            if (spRecharge < 100) spRecharge += 0.15;

            player.vy += GRAVITY;
            if (player.vy > 14) player.vy = 14;
            player.x += player.vx;
            player.y += player.vy;
            if (player.x < 0) player.x = 0;
            if (player.x > level.width - player.width) player.x = level.width - player.width;

            player.grounded = false;

            level.platforms.forEach(platform => {
                if (rectCollision(player, platform)) {
                    if (player.vy > 0 && player.y + player.height - player.vy <= platform.y + 5) {
                        player.y = platform.y - player.height; player.vy = 0; player.grounded = true;
                    } else if (player.vy < 0 && player.y - player.vy >= platform.y + platform.height) {
                        player.y = platform.y + platform.height; player.vy = 0;
                    } else {
                        if (player.vx > 0) player.x = platform.x - player.width;
                        else if (player.vx < 0) player.x = platform.x + platform.width;
                    }
                }
            });

            level.movingPlatforms.forEach(mp => {
                mp.x += mp.speed * mp.direction;
                if (mp.x <= mp.startX || mp.x >= mp.endX) mp.direction *= -1;
                if (rectCollision(player, mp)) {
                    if (player.vy > 0 && player.y + player.height - player.vy <= mp.y + 5) {
                        player.y = mp.y - player.height; player.vy = 0; player.grounded = true; player.x += mp.speed * mp.direction;
                    }
                }
            });

            if (player.y > canvas.height + 50) {
                lives--; screenShake = 12;
                createParticle(player.x, canvas.height - 50, '#E53935', 15);
                createFloatingText(player.x, canvas.height - 80, '💔', '#E53935');
                document.getElementById('lives').textContent = lives;
                if (lives <= 0) gameOver(); else resetPlayer();
            }

            if (player.invincible > 0) player.invincible--;

            level.enemies.forEach(enemy => {
                if (!enemy.alive) { if (enemy.squashTimer > 0) enemy.squashTimer--; return; }
                enemy.x += enemy.vx; enemy.vy += GRAVITY; enemy.y += enemy.vy; enemy.animFrame += 0.12;
                if (enemy.y + enemy.height > 416) { enemy.y = 416 - enemy.height; enemy.vy = 0; }
                if (enemy.x <= enemy.patrolStart || enemy.x >= enemy.patrolEnd) enemy.vx *= -1;

                if (player.invincible === 0 && rectCollision(player, enemy)) {
                    if (player.vy > 0 && player.y + player.height - player.vy < enemy.y + enemy.height / 2) {
                        enemy.alive = false; enemy.squashTimer = 30; player.vy = -9;
                        levelScore += 200; score += 200;
                        document.getElementById('score').textContent = score;
                        createParticle(enemy.x + enemy.width/2, enemy.y, '#E53935', 15);
                        createFloatingText(enemy.x + enemy.width/2, enemy.y - 20, '+200', '#FFD700');
                        screenShake = 4;
                    } else {
                        lives--; screenShake = 18;
                        createParticle(player.x + player.width/2, player.y + player.height/2, '#E53935', 20);
                        createFloatingText(player.x, player.y - 25, '-1 ❤️', '#E53935');
                        document.getElementById('lives').textContent = lives;
                        player.invincible = 90;
                        if (lives <= 0) gameOver();
                    }
                }
            });

            level.coins.forEach(coin => {
                if (!coin.collected) {
                    const coinRect = { x: coin.x, y: coin.y, width: 24, height: 28 };
                    if (rectCollision(player, coinRect)) {
                        coin.collected = true; levelCoins++; coins++;
                        levelScore += 100; score += 100;
                        document.getElementById('coins').textContent = coins;
                        document.getElementById('score').textContent = score;
                        createParticle(coin.x + 12, coin.y + 14, '#FFD700', 10);
                        createFloatingText(coin.x + 12, coin.y, '+100', '#FFD700');
                    }
                }
            });

            level.stars.forEach(star => {
                if (!star.collected) {
                    star.angle += 0.06;
                    const starRect = { x: star.x - 18, y: star.y - 18, width: 36, height: 36 };
                    if (rectCollision(player, starRect)) {
                        star.collected = true; levelScore += 800; score += 800;
                        document.getElementById('score').textContent = score;
                        createParticle(star.x, star.y, '#a29bfe', 30);
                        createFloatingText(star.x, star.y, '+800', '#a29bfe');
                        screenShake = 6;
                    }
                }
            });

            level.flags.forEach(flag => {
                if (player.x + player.width > flag.x && player.x < flag.x + 32) levelComplete();
            });

            player.animTimer++;
            if (player.animTimer > 8) { player.animTimer = 0; player.frame = (player.frame + 1) % 4; }

            if (player.x > 200) cameraX = player.x - 200;
        }

        function draw() {
            ctx.save();
            if (screenShake > 0) {
                ctx.translate(Math.random() * screenShake - screenShake/2, Math.random() * screenShake - screenShake/2);
                screenShake *= 0.9;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            level.decorations.forEach(dec => {
                if (dec.type === 'cloud') drawCloud(dec.x - cameraX, dec.y, dec.variant);
                else if (dec.type === 'flower') drawFlower(dec.x - cameraX, dec.variant);
            });

            level.platforms.forEach(platform => {
                if (platform.type === 'ground') drawGround(platform);
                else drawPlatform(platform);
            });

            level.movingPlatforms.forEach(mp => drawPlatform(mp));

            const time = Date.now() / 200;
            level.coins.forEach(coin => {
                if (!coin.collected) drawGem(coin.x - cameraX, coin.y + Math.sin(time + coin.bounceOffset) * 5);
            });

            level.stars.forEach(star => {
                if (!star.collected) drawStar(star.x - cameraX, star.y + Math.sin(star.angle) * 8, star.angle);
            });

            level.flags.forEach(flag => drawFlag(flag));

            level.enemies.forEach(enemy => {
                if (enemy.alive || enemy.squashTimer > 0) drawEnemy(enemy);
            });

            drawCharacter();
            drawParticles();
            drawFloatingTexts();

            ctx.restore();
        }

        function drawGround(platform) {
            const x = platform.x - cameraX;
            if (x > canvas.width + 50 || x + platform.width < -50) return;
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x, platform.y, platform.width, platform.height);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(x, platform.y, platform.width, 15);
        }

        function drawPlatform(platform) {
            const x = platform.x - cameraX;
            if (x > canvas.width + 50 || x + platform.width < -50) return;
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x, platform.y, platform.width, platform.height);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(x, platform.y, platform.width, 8);
        }

        function drawCloud(x, y, variant) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.arc(x, y, 25 + variant * 10, 0, Math.PI * 2);
            ctx.arc(x + 30, y - 10, 30 + variant * 8, 0, Math.PI * 2);
            ctx.arc(x + 60, y, 25 + variant * 10, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFlower(x, variant) {
            ctx.fillStyle = ['#FF6B6B', '#FFE66D', '#4ECDC4'][variant];
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(x + Math.cos(i * Math.PI * 2/5) * 8, 408 + Math.sin(i * Math.PI * 2/5) * 8, 6, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#FFE66D';
            ctx.beginPath();
            ctx.arc(x, 408, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGem(x, y) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(x, y - 12);
            ctx.lineTo(x + 12, y);
            ctx.lineTo(x, y + 12);
            ctx.lineTo(x - 12, y);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.moveTo(x - 5, y - 5);
            ctx.lineTo(x + 2, y);
            ctx.lineTo(x - 5, y + 5);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawStar(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = '#FFD700';
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const outerAngle = (i * 4 * Math.PI / 5) - Math.PI/2;
                const innerAngle = ((i * 4 + 2) * Math.PI / 5) - Math.PI/2;
                ctx.lineTo(Math.cos(outerAngle) * 20, Math.sin(outerAngle) * 20);
                ctx.lineTo(Math.cos(innerAngle) * 10, Math.sin(innerAngle) * 10);
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawFlag(flag) {
            const x = flag.x - cameraX;
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x + 10, flag.y, 8, 130);
            ctx.fillStyle = '#E53935';
            ctx.beginPath();
            ctx.moveTo(x + 18, flag.y);
            ctx.lineTo(x + 80, flag.y + 25);
            ctx.lineTo(x + 18, flag.y + 50);
            ctx.closePath();
            ctx.fill();
        }

        function drawEnemy(enemy) {
            const x = enemy.x - cameraX;
            if (x > canvas.width + 50 || x + enemy.width < -50) return;
            
            const squash = enemy.squashTimer > 0;
            const w = enemy.width, h = squash ? 12 : enemy.height;
            const bounce = Math.sin(enemy.animFrame) * 4;
            
            ctx.fillStyle = ['#9C27B0', '#2196F3', '#4CAF50', '#FF9800', '#F44336'][enemyTypes.indexOf(enemy.type) % 5];
            
            if (squash) {
                ctx.beginPath();
                ctx.ellipse(x + w/2, enemy.y + h/2, w, h, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(x + w/2, enemy.y + h/2 - bounce, w/2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(x + w/2 - 6, enemy.y + h/2 - 8 - bounce, 5, 0, Math.PI * 2);
                ctx.arc(x + w/2 + 6, enemy.y + h/2 - 8 - bounce, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(x + w/2 - 6, enemy.y + h/2 - 8 - bounce, 2, 0, Math.PI * 2);
                ctx.arc(x + w/2 + 6, enemy.y + h/2 - 8 - bounce, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawCharacter() {
            const x = player.x - cameraX;
            const y = player.y;
            const w = player.width;
            const h = player.height;
            
            if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) return;
            
            ctx.save();
            
            // Aura glow
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 15 + Math.sin(player.auraPhase) * 5;
            
            // Body
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Belly
            ctx.fillStyle = '#8BC34A';
            ctx.beginPath();
            ctx.ellipse(x + w/2, y + h/2 + 5, w/3, h/3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(x + w/2 - 8, y + h/3, 8, 10, 0, 0, Math.PI * 2);
            ctx.ellipse(x + w/2 + 8, y + h/3, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Pupils
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(x + w/2 - 6 + player.direction * 2, y + h/3 + 2, 4, 0, Math.PI * 2);
            ctx.arc(x + w/2 + 10 + player.direction * 2, y + h/3 + 2, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyebrows
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(x + w/2 - 14, y + h/4 - 5, 12, 4);
            ctx.fillRect(x + w/2 + 2, y + h/4 - 5, 12, 4);
            
            // Beak
            ctx.fillStyle = '#FF9800';
            ctx.beginPath();
            ctx.moveTo(x + w/2, y + h/2);
            ctx.lineTo(x + w/2 + 12, y + h/2 + 8);
            ctx.lineTo(x + w/2, y + h/2 + 15);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }

        function updateLevelSelect() {
            const container = document.getElementById('levelSelect');
            container.innerHTML = '';
            for (let i = 1; i <= totalLevels; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn red';
                btn.textContent = i;
                if (completedLevels.includes(i)) { 
                    btn.classList.add('completed'); 
                    btn.classList.remove('red');
                    btn.classList.add('green');
                }
                if (!unlockedLevels.includes(i)) { btn.disabled = true; }
                btn.onclick = () => { if (unlockedLevels.includes(i)) startGame(i); };
                container.appendChild(btn);
            }
            const progress = (completedLevels.length / totalLevels) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${completedLevels.length}/${totalLevels}`;
        }

        function gameLoop() { update(); updateParticles(); draw(); requestAnimationFrame(gameLoop); }

        function startGame(levelNum) {
            currentLevel = levelNum;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('levelIndicator').classList.remove('hidden');
            document.getElementById('chapterLevel').textContent = levelNum;
            document.getElementById('playerLevel').textContent = levelNum;
            gameRunning = true;
            generateLevel(levelNum);
            resetPlayer();
            levelScore = 0; levelCoins = 0; lives = 3; levelStartTime = Date.now();
            particles = []; floatingTexts = []; spRecharge = 100;
            document.getElementById('score').textContent = score;
            document.getElementById('coins').textContent = coins;
            document.getElementById('lives').textContent = lives;
        }

        function levelComplete() {
            gameRunning = false;
            const timeTaken = Math.floor((Date.now() - levelStartTime) / 1000);
            totalTime += timeTaken;
            let stars = '⭐';
            if (levelCoins >= 10) stars = '⭐⭐';
            if (levelCoins >= 20 && lives === 3) stars = '⭐⭐⭐';
            document.getElementById('levelScore').textContent = levelScore;
            document.getElementById('levelCoins').textContent = levelCoins;
            document.getElementById('levelTime').textContent = timeTaken + 's';
            
            const starsEl = document.getElementById('levelStars');
            starsEl.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const starSpan = document.createElement('span');
                starSpan.className = i < stars.length ? 'star' : 'star empty';
                starSpan.textContent = '⭐';
                starsEl.appendChild(starSpan);
            }
            
            if (!completedLevels.includes(currentLevel)) {
                completedLevels.push(currentLevel);
                localStorage.setItem('completedLevels', JSON.stringify(completedLevels));
            }
            if (currentLevel < totalLevels && !unlockedLevels.includes(currentLevel + 1)) {
                unlockedLevels.push(currentLevel + 1);
                localStorage.setItem('unlockedLevels', JSON.stringify(unlockedLevels));
            }
            score += lives * 300;
            if (currentLevel >= totalLevels) winGame();
            else document.getElementById('levelCompleteScreen').classList.remove('hidden');
            document.getElementById('levelIndicator').classList.add('hidden');
            createParticle(player.x, player.y, '#FFD700', 50);
            createFloatingText(player.x + player.width/2, player.y - 30, '🎉 LEVEL CLEAR! 🎉', '#FFD700');
        }

        function nextLevel() {
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            startGame(currentLevel + 1);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = currentLevel;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('levelIndicator').classList.add('hidden');
        }

        function winGame() {
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            document.getElementById('winScore').textContent = score;
            document.getElementById('winCoins').textContent = coins;
            document.getElementById('winTime').textContent = totalTime + 's';
            document.getElementById('winScreen').classList.remove('hidden');
        }

        function retryLevel() { document.getElementById('gameOverScreen').classList.add('hidden'); startGame(currentLevel); }
        function restartFromLevelComplete() { document.getElementById('levelCompleteScreen').classList.add('hidden'); startGame(currentLevel); }
        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            document.getElementById('winScreen').classList.add('hidden');
            document.getElementById('levelIndicator').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            score = 0; coins = 0; totalTime = 0; updateLevelSelect();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.jump = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.jump = false;
        });

        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        document.getElementById('btnLeft').addEventListener('touchend', () => keys.left = false);
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        document.getElementById('btnRight').addEventListener('touchend', () => keys.right = false);
        document.getElementById('btnJump').addEventListener('touchstart', (e) => { e.preventDefault(); keys.jump = true; });
        document.getElementById('btnJump').addEventListener('touchend', () => keys.jump = false);
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        updateLevelSelect();
        gameLoop();
    </script>
</body>
</html>
